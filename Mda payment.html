<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDA PAYMENT SURVICE</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            display: flex;
            flex-wrap: wrap; /* Mobile par stack hone ke liye */
            gap: 30px;
        }

        /* Desktop par 2:1 ka ratio rahega */
        .billing-section {
            flex: 2;
            min-width: 320px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cart-section {
            flex: 1;
            min-width: 320px;
        }

        h2, h4 { margin-top: 0; margin-bottom: 20px; }

        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; }

        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Username input group */
        .input-group { display: flex; }
        .input-group-text {
            background: #e9ecef;
            border: 1px solid #ced4da;
            padding: 10px;
            border-right: none;
            border-radius: 4px 0 0 4px;
        }
        .input-group .form-control { border-radius: 0 4px 4px 0; }

        /* Cart Card */
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .cart-list { list-style: none; padding: 0; margin: 0; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .text-muted { color: #6c757d; font-size: 12px; }
        .text-success { color: #28a745; font-weight: bold; }

        .btn-checkout {
            background-color: #007bff;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-redeem {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="billing-section">
        <h2>Billing address</h2>
        <form id="checkoutForm">
            <div class="row">
                <div class="col">
                    <label>First name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col">
                    <label>Last name</label>
                    <input type="text" class="form-control" required>
                </div>
            </div>

            <label>Username</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="Username" required>
            </div>

            <label>Email (Optional)</label>
            <input type="email" class="form-control" placeholder="you@example.com">

            <label>Address</label>
            <input type="text" class="form-control" placeholder="1234 Main St" required>

            <div class="row">
                <div class="col">
                    <label>Country</label>
                    <select class="form-control"><option>India</option></select>
                </div>
                <div class="col">
                    <label>State</label>
                    <select class="form-control"><option>Jharkhand</option></select>
                </div>
            </div>

            <hr>
            <h3>Payment</h3>
            <input type="radio" name="pay" checked> Credit card <br>
            <input type="radio" name="pay"> Debit card

            <button type="submit" class="btn-checkout">Continue to checkout</button>
        </form>
    </div>

    <div class="cart-section">
        <div class="card">
            <h4 style="display:flex; justify-content: space-between;">
                Your cart <span style="color:#6c757d;">3</span>
            </h4>
            <ul class="cart-list">
                <li class="cart-item">
                    <div>Product name<br><span class="text-muted">Brief description</span></div>
                    <span>$12</span>
                </li>
                <li class="cart-item">
                    <div>Second product<br><span class="text-muted">Brief description</span></div>
                    <span>$8</span>
                </li>
                <li class="cart-item text-success">
                    <div>Promo code<br><span class="text-muted">EXAMPLECODE</span></div>
                    <span>-$5</span>
                </li>
                <li class="cart-item" style="border:none; font-weight:bold; font-size:18px;">
                    <span>Total (USD)</span>
                    <span>$15</span>
                </li>
            </ul>
        </div>

        <div class="card" style="display:flex; gap:10px;">
            <input type="text" class="form-control" id="promoInput" placeholder="Promo code">
            <button class="btn-redeem" onclick="applyPromo()">Redeem</button>
        </div>
    </div>
</div>

<script>
    function applyPromo() {
        const val = document.getElementById('promoInput').value;
        if(val.toUpperCase() === "EXAMPLECODE") {
            alert("Promo Code Applied!");
        } else {
            alert("Invalid Code");
        }
    }

    document.getElementById('checkoutForm').onsubmit = function(e) {
        e.preventDefault();
        alert("Form Submit Success!");
    };
</script>

</body>
</html>
